# 从hub拉取镜像，用于用户部署
services:
  browserless-chrome:
    image: docker.1ms.run/browserless/chrome:latest
    restart: unless-stopped
    container_name: browserless-chrome
    network_mode: host
    environment:
      # 延长连接超时时间到 5 分钟（默认 60 秒）
      - CONNECTION_TIMEOUT=300000

  prisma-ai-backend:
    image: docker.1ms.run/onlyie/prisma-ai-backend:latest
    depends_on:
      # mysql经常需要启动好几次才能成功,得在它启动成功后再启动服务
      mysql-container:
        condition: service_healthy
      redis-container:
        condition: service_healthy
      mongo-container:
        condition: service_healthy
      minio-container:
        condition: service_healthy
    restart: unless-stopped
    container_name: backend
    # 使用主机网络模式，直接访问主机上的 Chrome remote debugging
    network_mode: host
    # 将指定的文件的环境变量加载到容器中
    env_file:
      - ./packages/backend/.env
      - ./packages/backend/.env.production
    environment:
      NODE_ENV: production
      MONGO_HOST: localhost
      # 覆盖env_file中的同名环境变量 - 使用 localhost 访问
      DATABASE_URL: mysql://root:qwqw1314.@localhost:3306/prisma-ai
      # 使用主机 Chrome remote debugging（network_mode: host 时用 localhost）
      PUPPETEER_BROWSER_WSE_ENDPOINT: ws://localhost:9222/devtools/browser/20ea8818-58f7-45e0-b781-d823f98e1a84
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
      DEEPWIKI_DOWN_URL: http://localhost:9009
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    volumes:
      - ./docker-data/nest-app/logs:/app/packages/backend/logs
      - ./docker-data/nest-app/data_user_use/feedback_ai:/app/packages/backend/data_user_use/feedback_ai
      - ./models:/app/models
      - ./user_data:/app/user_data
      # 这些用户数据目录在v5.0.2之后已废弃，保留是为了旧版本向新版本的迁移
      - ./projects:/app/projects
      - ./resumes:/app/resumes
      - ./project_wikis:/app/project_wikis
      - ./packages/backend/prisma_agent_config.json:/app/packages/backend/prisma_agent_config.json

  magic-resume-container:
    image: docker.1ms.run/onlyie/prisma-ai-resume-editor:latest
    network_mode: host
    restart: unless-stopped
    container_name: magic-resume

  deepwiki-down:
    image: docker.1ms.run/onlyie/prisma-ai-deepwiki-down:latest
    network_mode: host
    volumes:
      # docker run -v 需要处理windows兼容性
      - ./user_data:/user_data
    command: service --host 0.0.0.0 --port 9009

  nginx-container:
    image: docker.1ms.run/onlyie/prisma-ai-nginx:latest
    network_mode: host
    volumes:
      - ./nginx/logs:/var/log/nginx # Nginx 日志
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - prisma-ai-backend
      - minio-container

  mysql-container:
    image: docker.1ms.run/library/mysql
    network_mode: host
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    environment:
      # 初始数据库
      MYSQL_DATABASE: prisma-ai
      MYSQL_ROOT_PASSWORD: qwqw1314.
      # 允许任何主机连接
      MYSQL_ROOT_HOST: '%'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-container:
    image: docker.1ms.run/library/redis
    network_mode: host
    volumes:
      - ./docker-data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-container:
    image: docker.1ms.run/library/mongo
    network_mode: host
    volumes:
      - ./docker-data/mongo:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-container:
    image: docker.1ms.run/bitnamilegacy/minio:2025.4.3
    network_mode: host
    volumes:
      - ./docker-data/minio:/bitnami/minio/data
    restart: unless-stopped
    user: root
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123.
      MINIO_DEFAULT_BUCKETS: prisma-ai
    command: server /bitnami/minio/data --console-address :9001
